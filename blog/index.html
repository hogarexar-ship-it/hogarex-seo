<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Hogarex — Consejos para el hogar y profesionales</title>
  <meta name="description" content="Guías, consejos y precios actualizados para refacciones, mantenimiento del hogar y contratación de profesionales verificados en Argentina." />
  <link rel="canonical" href="https://landing.hogarex.ar/blog" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:    #003366;
      --navy-dark: #091e44;
      --yellow:  #F5C518;
      --yellow-hover: #e0b200;
      --white:   #ffffff;
      --gray-50: #f8f9fb;
      --gray-100:#f0f2f5;
      --gray-300:#d1d5db;
      --gray-500:#6b7280;
      --gray-700:#374151;
      --text:    #1a1a2e;
      --radius:  12px;
      --shadow:  0 2px 16px rgba(13,42,94,0.10);
      --shadow-hover: 0 8px 32px rgba(13,42,94,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--text); min-height: 100vh; }
    header { background: var(--navy); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo img { height: 36px; width: auto; display: block; }
    nav a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-left: 24px; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--yellow); }
    .blog-hero { background: var(--navy); padding: 56px 24px 72px; border-radius: 0 0 32px 32px; text-align: center; }
    .blog-hero-label { display: inline-block; background: var(--yellow); color: var(--navy); font-family: 'Sora', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 14px; border-radius: 999px; margin-bottom: 16px; }
    .blog-hero h1 { font-family: 'Sora', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; color: var(--white); line-height: 1.2; max-width: 600px; margin: 0 auto 12px; }
    .blog-hero p { color: rgba(255,255,255,0.65); font-size: 1rem; max-width: 480px; margin: 0 auto; line-height: 1.6; }
    .filters-wrap { max-width: 1100px; margin: -20px auto 0; padding: 0 24px; }
    .filters { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); margin-right: 4px; }
    .filter-btn { border: 1.5px solid var(--gray-300); background: var(--white); color: var(--gray-700); padding: 6px 16px; border-radius: 999px; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
    .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .blog-grid-section { max-width: 1100px; margin: 32px auto 64px; padding: 0 24px; }
    .section-count { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 20px; }
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .post-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: transform 0.22s ease, box-shadow 0.22s ease; display: flex; flex-direction: column; }
    .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .card-thumb { width: 100%; height: 180px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .card-tag { display: inline-block; background: var(--yellow); color: var(--navy); font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; width: fit-content; }
    .card-title { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; color: var(--navy); line-height: 1.35; margin-bottom: 8px; }
    .card-excerpt { font-size: 0.88rem; color: var(--gray-500); line-height: 1.6; flex: 1; margin-bottom: 16px; }
    .card-meta { display: flex; align-items: center; gap: 12px; font-size: 0.78rem; color: var(--gray-500); border-top: 1px solid var(--gray-100); padding-top: 12px; }
    .card-meta-dot { width: 3px; height: 3px; background: var(--gray-300); border-radius: 50%; }
    .card-read-more { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: var(--navy); margin-top: 12px; }
    .card-read-more svg { transition: transform 0.2s; }
    .post-card:hover .card-read-more svg { transform: translateX(4px); }
    .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .skeleton-thumb { height: 180px; }
    .skeleton-body { padding: 20px; }
    .skeleton-tag { height: 20px; width: 80px; margin-bottom: 12px; }
    .skeleton-title { height: 18px; width: 90%; margin-bottom: 8px; }
    .skeleton-title2 { height: 18px; width: 65%; margin-bottom: 16px; }
    .skeleton-text { height: 14px; width: 100%; margin-bottom: 6px; }
    .skeleton-text2 { height: 14px; width: 80%; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(9,30,68,0.65); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; overflow-y: auto; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); border-radius: 20px; width: 100%; max-width: 740px; box-shadow: 0 24px 64px rgba(9,30,68,0.3); transform: translateY(24px) scale(0.98); transition: transform 0.28s ease; overflow: hidden; margin: auto; }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header { background: var(--navy); padding: 28px 32px 24px; position: relative; border-radius: 0 0 24px 24px; }
    .modal-tag { display: inline-block; background: var(--yellow); color: var(--navy); font-size: 0.72rem; font-weight: 700; padding: 3px 12px; border-radius: 999px; margin-bottom: 14px; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: clamp(1.2rem, 3vw, 1.65rem); font-weight: 700; color: var(--white); line-height: 1.3; max-width: 560px; margin-bottom: 16px; }
    .modal-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: rgba(255,255,255,0.6); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.2s; }
    .modal-close:hover { background: rgba(255,255,255,0.28); }
    .modal-content { padding: 32px; }
    .modal-content h2 { font-family: 'Sora', sans-serif; font-size: 1.15rem; color: var(--navy); margin: 24px 0 10px; }
    .modal-content p { font-size: 0.95rem; line-height: 1.75; color: var(--gray-700); margin-bottom: 14px; }
    .modal-content ul { margin: 10px 0 16px 20px; }
    .modal-content li { font-size: 0.93rem; line-height: 1.7; color: var(--gray-700); margin-bottom: 6px; }
    .modal-cta { margin-top: 28px; padding: 20px 24px; background: var(--gray-50); border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .modal-cta p { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--navy); margin: 0; }
    .btn-yellow { background: var(--yellow); color: var(--navy); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 12px 24px; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; transition: background 0.2s, transform 0.15s; white-space: nowrap; display: inline-block; }
    .btn-yellow:hover { background: var(--yellow-hover); transform: scale(1.03); }
    footer { background: var(--navy-dark); color: rgba(255,255,255,0.5); text-align: center; padding: 28px 24px; font-size: 0.82rem; }
    footer a { color: var(--yellow); text-decoration: none; }
    @media (max-width: 600px) {
      .blog-hero { padding: 40px 20px 60px; }
      .modal-content { padding: 20px; }
      .modal-header { padding: 20px 20px 18px; }
      nav { display: none; }
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  fetch("/blog/posts.json")
  .then(r => r.json())
  .then(data => { allPosts = data; renderGrid("all"); })
  .catch(() => {
    document.getElementById("blog-grid").innerHTML =
      "<p style='color:var(--gray-500);grid-column:1/-1'>No se pudieron cargar los artículos.</p>";
  });

  function renderGrid(filter) {
    const grid = document.getElementById("blog-grid");
    const count = document.getElementById("post-count");
    const filtered = filter === "all" ? allPosts : allPosts.filter(p => p.cat === filter);
    count.textContent = `${filtered.length} artículo${filtered.length !== 1 ? "s" : ""}`;
    if (!filtered.length) {
      grid.innerHTML = "<p style='color:var(--gray-500);grid-column:1/-1'>No hay artículos en esta categoría todavía.</p>";
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <article class="post-card" data-id="${p.id}" role="button" tabindex="0">
        <div class="card-thumb">${p.emoji}</div>
        <div class="card-body">
          <span class="card-tag">${p.tag}</span>
          <h2 class="card-title">${p.title}</h2>
          <p class="card-excerpt">${p.excerpt}</p>
          <div class="card-meta">
            <span>${p.date}</span><span class="card-meta-dot"></span><span>${p.readTime} de lectura</span>
          </div>
          <span class="card-read-more">Leer artículo
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </div>
      </article>`).join("");
    grid.querySelectorAll(".post-card").forEach(c => {
      c.addEventListener("click", () => openPost(+c.dataset.id));
      c.addEventListener("keydown", e => { if (e.key === "Enter") openPost(+c.dataset.id); });
    });
  }

  function openPost(id) {
    const p = allPosts.find(x => x.id === id);
    if (!p) return;
    document.getElementById("modal-tag").textContent = p.tag;
    document.getElementById("modal-title").textContent = p.title;
    document.getElementById("modal-meta").innerHTML = `<span>📅 ${p.date}</span><span>⏱ ${p.readTime} de lectura</span>`;
    document.getElementById("modal-content").innerHTML = p.content;
    document.getElementById("modal-overlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderGrid(btn.dataset.cat);
    });
  });
</script>
</body>
</html>
